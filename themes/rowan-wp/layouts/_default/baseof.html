<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="{{ .Site.Language.Locale }}">
<head profile="http://gmpg.org/xfn/11">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="{{ .Description | default (.Summary | plainify | truncate 160) | default site.Params.description }}">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}" type="text/css" media="screen" />
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }} RSS Feed" href="{{ "/feed" | relURL }}" />
</head>
<body>
<div id="page">

{{ partial "header.html" . }}

<hr />

<div id="content">
	<div id="maincontent">
	<div class="topcorner"></div>
		<div class="contentpadding">
			{{ block "main" . }}{{ end }}
		<div class="clear"></div>
		</div>
	<div class="bottomcorner"></div>
	</div>
	{{ partial "sidebar.html" . }}
<div class="clear"></div>
</div>

{{ partial "footer.html" . }}

</div>
<script src="{{ "js/lightbox.js" | relURL }}"></script>
</body>
</html>
